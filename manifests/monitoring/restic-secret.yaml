apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restic-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-login
    kind: ClusterSecretStore
  target:
    name: restic-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: cb04cb1b-1037-40d6-a187-b375015e7ef6
        property: username
    - secretKey: password
      remoteRef:
        key: cb04cb1b-1037-40d6-a187-b375015e7ef6
        property: password
